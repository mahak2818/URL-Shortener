logging.level.com.java=DEBUG

# H2 in-memory database
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:Url;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Connection pool - pre-warm connections
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.initialization-fail-timeout=10000

# JPA / Hibernate - tuned for speed
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.sql.init.mode=always
spring.jpa.open-in-view=false

# Force DispatcherServlet to load eagerly on startup (not on first request)
spring.mvc.servlet.load-on-startup=1

# Server port
server.port=8081
